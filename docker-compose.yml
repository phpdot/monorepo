# Test services. Host ports avoid the usual local defaults.
# Run: docker compose up -d && composer test

services:
  mysql:
    image: mysql:9
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: phpdot_test
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -proot"]
      interval: 5s
      timeout: 3s
      retries: 30

  postgres:
    image: postgres:17
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: phpdot_test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d phpdot_test"]
      interval: 5s
      timeout: 3s
      retries: 30

  rabbitmq:
    image: rabbitmq:4-management
    ports:
      - "5673:5672"
      - "15673:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 30

  mongodb:
    image: mongo:8
    # single-node replica set so transaction tests work
    command: ["mongod", "--replSet", "rs0", "--port", "27018", "--bind_ip_all"]
    ports:
      - "27018:27018"
    healthcheck:
      test: ["CMD-SHELL", "mongosh --port 27018 --quiet --eval \"try { rs.status().ok } catch (e) { rs.initiate({_id: 'rs0', members: [{_id: 0, host: 'localhost:27018'}]}).ok }\""]
      interval: 5s
      timeout: 10s
      retries: 30

  redis:
    image: redis:8
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 30

  minio:
    image: minio/minio
    command: ["server", "/data", "--console-address", ":9001"]
    ports:
      - "9002:9000"
      - "9003:9001"
    environment:
      MINIO_ROOT_USER: phpdot
      MINIO_ROOT_PASSWORD: phpdot-secret
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 30

  minio-init:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c", "mc alias set local http://minio:9000 phpdot phpdot-secret && mc mb -p local/phpdot-test"]
    restart: "no"
